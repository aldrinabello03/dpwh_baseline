<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- DPWH Logo Approximation: Gear/Cog with Navy Blue and Orange -->
  <!-- Outer gear ring -->
  <circle cx="100" cy="100" r="90" fill="#1B3A6B"/>
  <!-- Gear teeth -->
  <rect x="88" y="5" width="24" height="20" rx="3" fill="#1B3A6B"/>
  <rect x="88" y="175" width="24" height="20" rx="3" fill="#1B3A6B"/>
  <rect x="5" y="88" width="20" height="24" rx="3" fill="#1B3A6B"/>
  <rect x="175" y="88" width="20" height="24" rx="3" fill="#1B3A6B"/>
  <!-- Diagonal teeth -->
  <rect x="142" y="20" width="24" height="20" rx="3" transform="rotate(45 154 30)" fill="#1B3A6B"/>
  <rect x="34" y="160" width="24" height="20" rx="3" transform="rotate(45 46 170)" fill="#1B3A6B"/>
  <rect x="160" y="142" width="20" height="24" rx="3" transform="rotate(45 170 154)" fill="#1B3A6B"/>
  <rect x="20" y="34" width="20" height="24" rx="3" transform="rotate(45 30 46)" fill="#1B3A6B"/>
  <!-- Inner circle background -->
  <circle cx="100" cy="100" r="65" fill="#F5F5F5"/>
  <!-- Orange center emblem -->
  <circle cx="100" cy="100" r="50" fill="#E85D26"/>
  <!-- DPWH text area -->
  <circle cx="100" cy="100" r="35" fill="white"/>
  <!-- Road icon inside -->
  <rect x="90" y="70" width="20" height="60" rx="5" fill="#1B3A6B"/>
  <rect x="70" y="85" width="60" height="10" rx="5" fill="#E85D26"/>
  <rect x="70" y="105" width="60" height="10" rx="5" fill="#E85D26"/>
  <!-- DPWH label -->
  <text x="100" y="185" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">DPWH</text>
</svg>
